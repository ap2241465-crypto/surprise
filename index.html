<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>For Tanyaaa</title><style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#ff9ecf,#ffd6e8);overflow:hidden;font-family:Arial}
.c{text-align:center;color:#fff}button{padding:14px 30px;border:none;border-radius:30px;margin:10px;font-size:20px;cursor:pointer}#yes{background:#ff4d88;color:#fff}#no{position:absolute}.h{position:absolute;color:#ff2d75;animation:f 5s linear forwards}@keyframes f{from{transform:translateY(100vh)}to{transform:translateY(-20vh);opacity:0}}</style></head>
<body><div class=c><h1>Hi Tanyaaa 💖</h1><h2>Will you be my mine? 🎀</h2><p>— Ayush</p><button id=yes>Yes 💕</button><button id=no>No 🙈</button><audio autoplay loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio></div>
<script><script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");

// No button bhaagega
function mv() {
    no.style.left = Math.random() * (window.innerWidth - 100) + "px";
    no.style.top = Math.random() * (window.innerHeight - 60) + "px";
}

no.onmouseover = mv;
no.ontouchstart = function(e) {
    e.preventDefault();
    mv();
};

// Yes button
yes.onclick = function () {

    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#ffb6d9;flex-direction:column;color:white;">
        <h1>Yay! 💖</h1>
        <h2>Tanyaaa is now Ayush's forever! 🎀</h2>
    </div>`;

    setTimeout(function () {
        window.location.href = "https://wa.me/917068189757?text=Yes%20❤️";
    }, 2000);
};

// Hearts
setInterval(function () {
    let d = document.createElement("div");
    d.className = "h";
    d.innerHTML = "❤";
    d.style.left = Math.random() * 100 + "vw";
    d.style.fontSize = (15 + Math.random() * 25) + "px";
    document.body.appendChild(d);

    setTimeout(function () {
        d.remove();
    }, 5000);
}, 200);
</script>
